<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wiki Narrations</title>
<style>
:root {
  --bg:      oklch(0.16 0.010 260);
  --bg-elev: oklch(0.21 0.012 260);
  --bg-hi:   oklch(0.26 0.014 260);
  --fg:      oklch(0.95 0.004 260);
  --fg-mid:  oklch(0.78 0.007 260);
  --fg-dim:  oklch(0.55 0.010 260);
  --border:  oklch(0.32 0.012 260);
  --accent:  oklch(0.80 0.16 65);
  --cool:    oklch(0.76 0.13 200);
  --grow:    oklch(0.80 0.17 148);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--fg); min-height: 100vh; }
body {
  font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ── password gate ─────────────────────────── */
#gate {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  flex-direction: column;
  gap: 1.5rem;
}
#gate h1 {
  font: 600 clamp(1.4rem, 3vw, 2rem)/1.2 "Source Serif 4", "Iowan Old Style", Charter, Georgia, serif;
  letter-spacing: -0.015em;
  color: var(--accent);
}
#gate p { color: var(--fg-dim); font-size: 0.9rem; }
#gate form {
  display: flex;
  gap: 0.75rem;
  align-items: center;
}
#gate input[type="password"] {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  color: var(--fg);
  padding: 0.6rem 1rem;
  border-radius: 6px;
  font-size: 1rem;
  outline: none;
  width: 200px;
  transition: border-color 0.2s;
}
#gate input[type="password"]:focus {
  border-color: var(--accent);
}
#gate button {
  background: var(--accent);
  color: var(--bg);
  border: none;
  padding: 0.6rem 1.2rem;
  border-radius: 6px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
#gate button:hover { opacity: 0.85; }
#gate .error {
  color: oklch(0.70 0.18 25);
  font-size: 0.85rem;
  min-height: 1.2em;
}

/* ── content ───────────────────────────────── */
#content {
  display: none;
  max-width: 860px;
  margin: 0 auto;
  padding: 3rem 1.5rem 6rem;
}
#content.visible { display: block; }

#content header {
  margin-bottom: 3rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 2rem;
}
#content header h1 {
  font: 600 clamp(2rem, 4.5vw, 3rem)/1.15 "Source Serif 4", "Iowan Old Style", Charter, Georgia, serif;
  letter-spacing: -0.015em;
  color: var(--accent);
  margin-bottom: 0.5rem;
}
#content header p {
  color: var(--fg-dim);
  font-size: 0.95rem;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1.25rem;
}

.card {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.5rem;
  transition: border-color 0.25s, transform 0.2s;
  text-decoration: none;
  color: inherit;
  display: block;
}
.card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}
.card h2 {
  font: 600 1.15rem/1.3 "Source Serif 4", "Iowan Old Style", Charter, Georgia, serif;
  color: var(--fg);
  margin-bottom: 0.5rem;
}
.card .date {
  font: 0.8rem/1 "JetBrains Mono", "SF Mono", ui-monospace, monospace;
  color: var(--fg-dim);
  margin-bottom: 0.65rem;
}
.card .desc {
  color: var(--fg-mid);
  font-size: 0.9rem;
  line-height: 1.55;
}
.card .tag {
  display: inline-block;
  background: var(--bg-hi);
  color: var(--fg-dim);
  font-size: 0.75rem;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  margin-top: 0.75rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.card .tag.health { color: var(--grow); }
.card .tag.tech { color: var(--cool); }

footer {
  text-align: center;
  color: var(--fg-dim);
  font-size: 0.8rem;
  margin-top: 4rem;
  padding-top: 2rem;
  border-top: 1px solid var(--border);
}

@media (max-width: 720px) {
  .card-grid { grid-template-columns: 1fr; }
  #content { padding: 2rem 1rem 4rem; }
}
</style>
</head>
<body>

<!-- password gate -->
<div id="gate">
  <h1>Wiki Narrations</h1>
  <p>Enter the password to continue.</p>
  <form id="gate-form">
    <input type="password" id="gate-pw" placeholder="Password" autocomplete="off" autofocus>
    <button type="submit">Enter</button>
  </form>
  <div class="error" id="gate-error"></div>
</div>

<!-- narration index (hidden until auth) -->
<div id="content">
  <header>
    <h1>Wiki Narrations</h1>
    <p>Interactive visual explainers built from the knowledge base.</p>
  </header>

  <div class="card-grid" id="cards">
    <!-- cards are injected by JS from the NARRATIONS array below -->
  </div>

  <footer>
    Built with Claude Code &middot; d3.js &middot; OKLCH
  </footer>
</div>

<script>
// ── password ──────────────────────────────────
// SHA-256 hash of the password, computed once. The actual password never appears in source.
const HASH = '4d1608c849f1a4968565d5019e500b9c3541f654c33ac9d096b610d27229499c'; // sha256("candy")

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
}

const gate = document.getElementById('gate');
const content = document.getElementById('content');
const form = document.getElementById('gate-form');
const pw = document.getElementById('gate-pw');
const err = document.getElementById('gate-error');

// check session
if (sessionStorage.getItem('wiki-narration-auth') === 'ok') {
  gate.style.display = 'none';
  content.classList.add('visible');
  renderCards();
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const h = await sha256(pw.value);
  if (h === HASH) {
    sessionStorage.setItem('wiki-narration-auth', 'ok');
    gate.style.display = 'none';
    content.classList.add('visible');
    renderCards();
  } else {
    err.textContent = 'Incorrect password.';
    pw.value = '';
    pw.focus();
  }
});

// ── narration registry ────────────────────────
// Add entries here when publishing new narrations.
const NARRATIONS = [
  // { file, title, date, desc, tag }
];

function renderCards() {
  const grid = document.getElementById('cards');
  if (NARRATIONS.length === 0) {
    grid.innerHTML = '<p style="color:var(--fg-dim);grid-column:1/-1;text-align:center;padding:3rem 0;">No narrations published yet. Use <code>/kb-publish</code> to add one.</p>';
    return;
  }
  grid.innerHTML = NARRATIONS.map(n => `
    <a class="card" href="${n.file}">
      <h2>${n.title}</h2>
      <div class="date">${n.date}</div>
      <div class="desc">${n.desc}</div>
      <span class="tag ${n.tag}">${n.tag}</span>
    </a>
  `).join('');
}
</script>
</body>
</html>
